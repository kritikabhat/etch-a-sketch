<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Kritika">
        <meta name="description" content="Basic sketchboard">
        <link rel="stylesheet" href="style.css">
        <title>Demo</title>
        <link rel="icon" href="images/icon.png" type="imagine/x-icon">
    </head>
    <body>
        <h1>Etch-A-Sketch</h1>
        <div id="sketchArea">
            <section id="toolbarArea">
                <div>Pick brush size</div>
                <div><input id="brushSizeInput" type="range" nin="1" max="20"></div>
                <div>Pick Brush Color</div>
                <div><input id="colorInput" type="color"></div>
                <div><button id="erasorBtn">Erasor</button></div>
                <div><button id="clearBtn">Clear Board</button></div>
            </section>
            <section id="gridArea">
                <div id="container"></div>
            </section>
        </div>
        <script src="script.js"></script>    
    </body>
</html>
