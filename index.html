<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Kritika">
        <meta name="description" content="Basic sketchboard">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Demo</title>
        <link rel="icon" href="images/icon.png" type="imagine/x-icon">
    </head>
    <body>
        <h1>Etch-A-Sketch</h1>
        <div id="sketchArea">
            <section id="toolbarArea">
                <div class="toolbarDiv">
                    <div>Brush size</div>
                    <div><input class="slider" id="brushSizeInput" type="range" nin="1" max="10"></div>
                </div>
                <div class="toolbarDiv">
                    <div>Brush Color</div>
                    <div><input id="colorInput" type="color">
                </div>
                </div>
                <div class="toolbarDiv">
                    <button id="erasorBtn">Erasor</button>
                    <div><input class="slider" id="erasorSizeInput" type="range" nin="1" max="10"></div>
                </div>
                <div class="toolbarDiv">
                    <button id="clearBtn">Clear Board</button>
                </div>
            </section>
            <section id="gridArea">
                <div id="container"></div>
            </section>
        </div>
        <script src="script.js"></script>    
    </body>
</html>
