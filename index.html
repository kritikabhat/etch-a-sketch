<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Kritika">
        <meta name="description" content="Basic sketchboard">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Demo</title>
        <link rel="icon" href="images/icon.png" type="imagine/x-icon">
    </head>
    <body>
        <h1><u>Etch-A-Sketch</u></h1>
        <p class="mobileDevices">This website is designed for desktop users only, it will not function on small screens.</p>
        <div class="sketchArea">
            <section id="toolbarArea">
                <div class="toolbarDiv">
                    <div>Pick Color:<input id="colorInput" type="color"></div>
                </div>
                <div class="toolbarDiv">
                    <button id="erasorBtn">Erasor</button>
                </div>
                <div class="toolbarDiv">
                    <button id="clearBtn">Clear Board</button>
                </div>
                <div class="toolbarDiv">
                    <div>Brush/Grid size</div>
                    <div><input class="slider" id="gridSize" type="range" nin="1" max="100"></div>
                </div>
            </section>
            <section id="gridArea">
                <div id="container"></div>
            </section>
        </div>
        <script src="script.js"></script>    
    </body>
</html>
